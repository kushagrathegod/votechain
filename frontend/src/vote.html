<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoteChain — Cast Your Vote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              primary: { 50: '#f0f7ff', 600: '#0069c8', 700: '#0154a2' },
              surface: { 50: '#fafaf9', 100: '#f4f4f2', 200: '#e7e5e2', 300: '#d5d2cd', 500: '#716d66', 800: '#27251f' }
            },
            boxShadow: { card: '0 1px 2px -1px rgb(0 0 0 / 0.08), 0 2px 4px 0 rgb(0 0 0 / 0.04)' }
          }
        }
      }
    </script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 24px;
            margin-bottom: 24px;
            border: 1px solid #e7e5e2;
            display: none;
        }
        .video-container video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .video-container canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-surface-50 min-h-screen font-sans antialiased text-surface-800 p-4 md:p-10">
    <div class="max-w-3xl mx-auto flex items-center justify-between mb-8">
        <div class="flex items-center gap-2 text-xl font-extrabold text-surface-800">
            <span class="text-2xl">🗳️</span> VoteChain
        </div>
        <div class="flex items-center gap-3">
            <span id="voterBadge" class="text-sm px-4 py-2 bg-white border border-surface-200 rounded-full font-medium shadow-sm">Authenticating...</span>
            <button onclick="goToProfile()" class="text-sm px-4 py-2 bg-surface-800 hover:bg-surface-700 text-white rounded-full font-medium shadow-sm transition-colors flex items-center gap-1.5">
                <span>👤</span> Profile
            </button>
        </div>
    </div>

    <div class="max-w-3xl mx-auto">
        <!-- GLOBAL SESSION SELECTOR -->
        <div class="bg-white border border-surface-200 shadow-card rounded-2xl p-5 mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4" id="sessionSelectorPanel" style="display:none">
            <span class="font-bold text-surface-800">Voting Session:</span>
            <select id="electionIdSelect" onchange="loadElectionData()" class="flex-1 bg-surface-50 border border-surface-300 rounded-xl px-4 py-2.5 text-surface-800 font-medium focus:outline-none focus:border-primary-600 focus:ring-1 focus:ring-primary-600">
                <option value="">Loading active sessions...</option>
            </select>
        </div>

        <div id="loading" class="text-center py-20">
            <div class="w-10 h-10 border-4 border-surface-200 border-t-primary-600 rounded-full inline-block mb-4 animate-[spin_0.8s_linear_infinite]"></div>
            <div class="text-surface-500 font-medium">Loading blockchain...</div>
        </div>

        <div id="main" style="display:none" class="bg-white border border-surface-200 shadow-card rounded-2xl p-6 md:p-8">
            <div class="bg-surface-50 border border-surface-200 rounded-2xl p-6 md:p-8 mb-8">
                <div class="inline-block bg-green-100 text-green-700 border border-green-200 rounded-full px-3 py-1 text-xs font-bold mb-3" id="statusBadge">● Active</div>
                <h1 id="electionName" class="text-2xl md:text-3xl font-extrabold text-surface-800 mb-1">–</h1>
                <div class="text-sm font-medium text-surface-500" id="electionDates">–</div>
            </div>

            <div class="text-xs font-bold text-surface-500 uppercase tracking-wider mb-4">Select a Candidate</div>
            <div class="grid gap-3 mb-8" id="candidateGrid"></div>

            <button id="prepareVoteBtn" onclick="prepareBiometricVote()" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl py-4 transition-colors">
                Verify Identity and Vote
            </button>

            <div id="facePrompt" style="display:none; text-align: center; margin-top: 20px;">
                <h3 class="text-lg font-bold text-surface-800 mb-1">Verify Biometric Signature</h3>
                <p class="text-sm font-medium text-surface-500 mb-4">Please center your face in the frame.</p>
                <div class="video-container" id="videoContainer">
                    <video id="video" autoplay muted playsinline></video>
                </div>
                <button id="voteBtn" disabled onclick="castVote()" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl py-4 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Take Scan &amp; Cast Vote
                </button>
            </div>

            <div id="msg" class="mt-6 font-medium"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@4/dist/web3.min.js"></script>
    <script>
        function goToProfile() {
            if (voterToken) {
                window.location.href = `/profile?Authorization=Bearer%20${encodeURIComponent(voterToken)}`;
            } else {
                window.location.href = '/';
            }
        }

        const EMOJIS = ['🦁', '🦊', '🐺', '🦅', '🌟', '🔥', '⚡', '🌊'];
        function getPartySymbol(partyName) {
            if (!partyName) return '👤';
            const p = partyName.toLowerCase();
            if (p.includes('bjp') || p.includes('bharatiya')) return '🪷';
            if (p.includes('inc') || p.includes('congress')) return '✋';
            if (p.includes('aap') || p.includes('aam aadmi')) return '🧹';
            if (p.includes('tmc') || p.includes('trinamool')) return '🌿';
            if (p.includes('dmk') || p.includes('dravida')) return '🌅';
            if (p.includes('sp') || p.includes('samajwadi')) return '🚲';
            if (p.includes('jdu') || p.includes('janata dal united')) return '🏹';
            if (p.includes('ncp') || p.includes('nationalist')) return '🕰️';
            if (p.includes('jmm') || p.includes('jharkhand')) return '🏹';
            if (p.includes('cpi') || p.includes('communist')) return '☭';
            if (p.includes('brs') || p.includes('rashtra samithi')) return '🚗';
            if (p.includes('shiv') || p.includes('ubt')) return '🔥';
            
            return partyName.charAt(0).toUpperCase();
        }
        let contract, selectedCandidate = null, voterToken = null;
        let modelsLoaded = false, isDetecting = false, videoStream = null;

        async function init() {
            const resp = await fetch('/contract.json?t=' + Date.now());
            const info = await resp.json();
            const web3 = new Web3(new Web3.providers.HttpProvider('http://127.0.0.1:8545'));
            contract = new web3.eth.Contract(info.abi, info.address);

            // Get JWT
            const tokenMatch = window.location.search.match(/Authorization=Bearer%20([^&]+)/);
            if (!tokenMatch) { window.location.href = '/'; return; }
            voterToken = decodeURIComponent(tokenMatch[1]);

            // Identity info
            const meRes = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${voterToken}` } });
            const meData = await meRes.json();
            document.getElementById('voterBadge').textContent = '👤 ' + (meData.full_name || meData.name || 'Voter');

            // Load sessions
            const ids = await contract.methods.getElectionIds().call();
            const select = document.getElementById('electionIdSelect');
            select.innerHTML = '';

            if (ids.length === 0) {
                document.getElementById('loading').innerHTML = `
                    <div class="text-center py-20 px-5">
                        <div class="text-6xl mb-6">🗳️</div>
                        <h2 class="text-2xl font-extrabold text-surface-800 mb-3">No Active Election Session</h2>
                        <p class="text-surface-500 font-medium max-w-sm mx-auto">No voting session has been created yet.<br>Please wait for the administrator to open an election.</p>
                    </div>`;
                return;
            }

            ids.forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = id;
                select.appendChild(opt);
            });

            document.getElementById('sessionSelectorPanel').style.display = 'flex';
            loadElectionData();

            // Background load models
            Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri('/models'),
                faceapi.nets.faceLandmark68Net.loadFromUri('/models'),
                faceapi.nets.faceRecognitionNet.loadFromUri('/models')
            ]).then(() => { modelsLoaded = true; });
        }

        async function loadElectionData() {
            const electionId = document.getElementById('electionIdSelect').value;
            if (!electionId) return;

            document.getElementById('main').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('msg').innerHTML = '';
            selectedCandidate = null;

            try {
                const e = await contract.methods.getElection(electionId).call();
                document.getElementById('electionName').textContent = e[1];
                const s = new Date(Number(e[2]) * 1000).toLocaleDateString();
                const d = new Date(Number(e[3]) * 1000).toLocaleDateString();
                document.getElementById('electionDates').textContent = `Session: ${s} to ${d}`;

                const count = Number(await contract.methods.getCandidateCount(electionId).call());
                const grid = document.getElementById('candidateGrid');
                grid.innerHTML = '';

                for (let i = 1; i <= count; i++) {
                    const c = await contract.methods.getCandidate(electionId, i).call();
                    if (Number(c[0]) === 0) continue; // Skip deleted candidates
                    
                    const partySlug = c[2].toLowerCase().replace(/[^a-z0-9]/g, '');
                    const partySymbol = getPartySymbol(c[2]);

                    const card = document.createElement('div');
                    card.className = 'bg-white border-2 border-surface-200 hover:border-primary-600 rounded-xl p-4 md:p-5 cursor-pointer transition-all flex items-center gap-4';
                    card.innerHTML = `
                        <div class="relative w-12 h-12 shrink-0">
                            <div class="absolute inset-0 bg-primary-50 text-primary-600 rounded-full flex items-center justify-center text-2xl border border-primary-100 shadow-sm">${partySymbol}</div>
                            <img src="/public/logos/${partySlug}.png" alt="${c[2]}" class="absolute inset-0 w-12 h-12 rounded-full object-cover z-10" onerror="this.style.display='none'" />
                        </div>
                        <div><h3 class="font-bold text-surface-800 text-lg">${c[1]}</h3><p class="text-sm font-medium text-surface-500">${c[2]}</p></div>
                    `;
                    card.onclick = () => {
                        document.querySelectorAll('#candidateGrid > div').forEach(el => {
                            el.classList.remove('border-primary-600', 'bg-primary-50', 'ring-2', 'ring-primary-600/20');
                            el.classList.add('border-surface-200', 'bg-white');
                        });
                        card.classList.remove('border-surface-200', 'bg-white');
                        card.classList.add('border-primary-600', 'bg-primary-50', 'ring-2', 'ring-primary-600/20');
                        selectedCandidate = Number(c[0]);
                    };
                    grid.appendChild(card);
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main').style.display = 'block';
                document.getElementById('prepareVoteBtn').style.display = 'block';
                document.getElementById('facePrompt').style.display = 'none';

            } catch (err) { console.error(err); }
        }

        async function prepareBiometricVote() {
            if (!selectedCandidate) { alert('Please select a candidate.'); return; }
            if (!modelsLoaded) { alert('Verifying biometric engine status... please wait.'); return; }

            document.getElementById('prepareVoteBtn').style.display = 'none';
            document.getElementById('facePrompt').style.display = 'block';
            document.getElementById('videoContainer').style.display = 'block';

            const video = document.getElementById('video');
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                videoStream = stream;
                video.srcObject = stream;
            });

            video.onplay = () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                document.getElementById('videoContainer').appendChild(canvas);
                faceapi.matchDimensions(canvas, { width: video.clientWidth, height: video.clientHeight });

                document.getElementById('voteBtn').disabled = false;

                setInterval(async () => {
                    const dets = await faceapi.detectSingleFace(video).withFaceLandmarks();
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (dets) {
                        const resized = faceapi.resizeResults(dets, { width: canvas.width, height: canvas.height });
                        faceapi.draw.drawDetections(canvas, resized);
                    }
                }, 200);
            };
        }

        async function castVote() {
            const btn = document.getElementById('voteBtn');
            btn.disabled = true;
            btn.textContent = 'Analyzing Biometrics...';

            try {
                const det = await faceapi.detectSingleFace(document.getElementById('video')).withFaceLandmarks().withFaceDescriptor();
                if (!det) { alert('Face not detected. Stand still.'); btn.disabled = false; return; }

                const res = await fetch('/api/cast-vote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${voterToken}` },
                    body: JSON.stringify({
                        electionId: document.getElementById('electionIdSelect').value,
                        candidateId: selectedCandidate,
                        face_embedding: Array.from(det.descriptor)
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
                    document.getElementById('facePrompt').style.display = 'none';
                    document.getElementById('msg').innerHTML = `
                        <div class="bg-green-50 border border-green-200 text-green-700 rounded-xl p-5 text-left mb-4 shadow-sm">
                            🏆 <strong class="ml-1">Vote Recorded!</strong><br>
                            <div class="font-mono text-xs bg-white border border-green-200 px-3 py-2 rounded-lg mt-3 break-all text-surface-800">
                                TX: ${data.transactionHash}
                            </div>
                        </div>`;
                } else {
                    alert(data.error);
                    btn.disabled = false;
                    btn.textContent = 'Take Scan & Cast Vote';
                }
            } catch (e) { 
                alert(e.message); 
                btn.disabled = false; 
                btn.textContent = 'Take Scan & Cast Vote';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
